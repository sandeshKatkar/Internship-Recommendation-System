{% extends "base.html" %}
{% block title %}Login - Internship Recommendation System{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px;">
  <h2 style="color: #1B4332; text-align: center; margin-bottom: 20px;">User Login</h2>
  
  <form method="POST" action="{{ url_for('login') }}">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" class="form-control" placeholder="Enter email address" required>
    </div>
    
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
    </div>
    
    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px;">Log In</button>
  </form>
  
  <div style="text-align: center; margin-top: 20px;">
    <p>Don't have an account? <a href="{{ url_for('register') }}" style="color: #1B4332; font-weight: bold;">Register here</a></p>
  </div>
</div>
{% endblock %}
